<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Attribution Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        padding: 24px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #0f1115;
        color: #ffffff;
      }
      h1 {
        margin: 0 0 16px 0;
        font-size: 18px;
        font-weight: 600;
      }
      .note {
        margin: 0 0 16px 0;
        color: #c7c7c7;
        font-size: 12px;
      }
      .card {
        border: 1px solid #242a33;
        background: #121622;
        padding: 12px;
        margin: 0 0 16px 0;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr 1.6fr auto;
        gap: 10px;
        align-items: end;
      }
      label {
        display: block;
        font-size: 12px;
        color: #c7c7c7;
        margin-bottom: 6px;
      }
      input[type="text"],
      input[type="url"] {
        width: 100%;
        box-sizing: border-box;
        background: #0f1420;
        border: 1px solid #242a33;
        color: #ffffff;
        padding: 10px 10px;
        border-radius: 6px;
        font-size: 13px;
        outline: none;
      }
      input[type="text"]:focus,
      input[type="url"]:focus {
        border-color: #3a4556;
      }
      button {
        background: #e9e9e9;
        color: #0f1115;
        border: 0;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .form-help {
        margin-top: 8px;
        font-size: 12px;
        color: #c7c7c7;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid #242a33;
        background: #121622;
      }
      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #242a33;
        text-align: left;
        font-size: 13px;
      }
      th {
        font-weight: 600;
        color: #e9e9e9;
        background: #0f1420;
      }
      tbody tr:hover {
        background: #151c2a;
      }
      .muted {
        color: #c7c7c7;
      }
      .right {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .error {
        margin-top: 12px;
        color: #ffb4b4;
        font-size: 13px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Attribution Dashboard</h1>
    <p class="note muted">Data source: <code>/dashboard</code></p>

    <form id="createLinkForm" class="card" autocomplete="off">
      <div class="form-row">
        <div>
          <label for="label">Label</label>
          <input
            id="label"
            name="label"
            type="text"
            placeholder="Instagram Post Jan 17"
            required
          />
        </div>
        <div>
          <label for="slug">Slug</label>
          <input id="slug" name="slug" type="text" placeholder="ig-jan17" required />
        </div>
        <div>
          <label for="destination">Destination URL</label>
          <input
            id="destination"
            name="destination"
            type="url"
            placeholder="https://mysite.com"
            required
          />
        </div>
        <div>
          <button id="createBtn" type="submit">Create Link</button>
        </div>
      </div>
      <div id="createMsg" class="form-help" aria-live="polite"></div>
    </form>

    <table>
      <thead>
        <tr>
          <th>Label</th>
          <th>Slug</th>
          <th class="right">Clicks</th>
          <th class="right">Conversions</th>
          <th class="right">Conversion Rate</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr>
          <td class="muted" colspan="5">Loading…</td>
        </tr>
      </tbody>
    </table>

    <div id="error" class="error" hidden></div>

    <script>
      function setCreateMessage(message, isError = false) {
        const el = document.getElementById("createMsg");
        el.textContent = message || "";
        el.style.color = isError ? "#ffb4b4" : "#c7c7c7";
      }

      function fmtRate(n) {
        const x = Number(n);
        if (!Number.isFinite(x)) return "0.00%";
        return `${x.toFixed(2)}%`;
      }

      async function load() {
        const tbody = document.getElementById("rows");
        const err = document.getElementById("error");
        try {
          const res = await fetch("/dashboard", {
            headers: { Accept: "application/json" },
          });
          if (!res.ok) {
            throw new Error(`GET /dashboard failed: ${res.status} ${res.statusText}`);
          }
          const data = await res.json();

          tbody.innerHTML = "";
          if (!Array.isArray(data) || data.length === 0) {
            const tr = document.createElement("tr");
            tr.innerHTML = `<td class="muted" colspan="5">No links yet.</td>`;
            tbody.appendChild(tr);
            return;
          }

          for (const row of data) {
            const tr = document.createElement("tr");
            const label = row.label ?? "";
            const slug = row.slug ?? "";
            const clicks = Number(row.clicks ?? 0);
            const conversions = Number(row.conversions ?? 0);
            const rate = fmtRate(row.conversion_rate);

            tr.innerHTML = `
              <td>${escapeHtml(label || "(no label)")}</td>
              <td class="muted">${escapeHtml(slug)}</td>
              <td class="right">${clicks}</td>
              <td class="right">${conversions}</td>
              <td class="right">${rate}</td>
            `;
            tbody.appendChild(tr);
          }
        } catch (e) {
          tbody.innerHTML = `<tr><td class="muted" colspan="5">Failed to load.</td></tr>`;
          err.hidden = false;
          err.textContent = String(e && e.stack ? e.stack : e);
        }
      }

      async function createLink({ slug, label, destination }) {
        const res = await fetch("/links", {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify({ slug, label, destination }),
        });

        let bodyText = "";
        let json = null;
        try {
          json = await res.json();
        } catch {
          bodyText = await res.text().catch(() => "");
        }

        if (!res.ok) {
          const msg =
            (json && (json.error || json.message)) ||
            bodyText ||
            `POST /links failed: ${res.status} ${res.statusText}`;
          throw new Error(msg);
        }

        return json;
      }

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      document.getElementById("createLinkForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("createBtn");

        const label = document.getElementById("label").value.trim();
        const slug = document.getElementById("slug").value.trim();
        const destination = document.getElementById("destination").value.trim();

        btn.disabled = true;
        setCreateMessage("Creating…");
        try {
          await createLink({ slug, label, destination });
          setCreateMessage("Created.");
          document.getElementById("slug").value = "";
          document.getElementById("destination").value = "";
          document.getElementById("label").focus();
          await load();
        } catch (err) {
          setCreateMessage(String(err && err.message ? err.message : err), true);
        } finally {
          btn.disabled = false;
        }
      });

      load();
    </script>
  </body>
</html>
